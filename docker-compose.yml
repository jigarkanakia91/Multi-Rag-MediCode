services:
  api:
    build: .
    container_name: medcode-api
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      qdrant:
        condition: service_healthy
      postgres:
        condition: service_healthy
    volumes:
      - ./data:/app/data:ro
    networks:
      - medcode-net
    deploy:
      resources:
        limits:
          cpus: "2"
          memory: 2G

  qdrant:
    image: qdrant/qdrant:latest
    container_name: medcode-qdrant
    restart: unless-stopped
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'echo > /dev/tcp/localhost/6333'"]
      interval: 15s
      timeout: 5s
      retries: 5
    networks:
      - medcode-net

  postgres:
    image: postgres:16-alpine
    container_name: medcode-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: medcode
      POSTGRES_PASSWORD: medcode
      POSTGRES_DB: medcode_rag
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U medcode -d medcode_rag"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - medcode-net

  redis:
    image: redis:7-alpine
    container_name: medcode-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - medcode-net

volumes:
  qdrant_data:
  postgres_data:

networks:
  medcode-net:
    driver: bridge
